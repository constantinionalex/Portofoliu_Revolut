<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofoliu Revolut</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f9; }
        .search-box { position: relative; }
        .results-dropdown { 
            position: absolute; width: 100%; z-index: 1000; 
            background: white; border: 1px solid #ddd; border-radius: 8px;
            max-height: 200px; overflow-y: auto; display: none;
        }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="mb-4 text-primary fw-bold"><i class="bi bi-wallet2 me-2"></i>Portofoliu Acțiuni</h2>

    <div class="card p-4 mb-4">
        <form id="stockForm" class="row g-3 align-items-end text-start">
            <div class="col-md-6 search-box">
                <label class="form-label fw-bold">Caută Acțiune (Nume sau Simbol)</label>
                <input type="text" id="symbolInput" class="form-control" placeholder="Ex: Google, Tesla, Apple..." autocomplete="off" required>
                <div id="results" class="results-dropdown list-group list-group-flush"></div>
                <input type="hidden" id="finalSymbol">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Preț Achiziție ($)</label>
                <input type="number" id="purchasePrice" class="form-control" step="0.01" required>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Adaugă Acțiune</button>
            </div>
        </form>
    </div>

    <div class="card overflow-hidden">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-4">Simbol</th>
                    <th>Achiziție</th>
                    <th>Vârf (24h)</th>
                    <th>Status</th>
                    <th class="text-end pe-4">Acțiuni</th>
                </tr>
            </thead>
            <tbody>
                {% for stock in stocks %}
                <tr>
                    <td class="ps-4"><strong>{{ stock.symbol }}</strong></td>
                    <td>${{ stock.buy }}</td>
                    <td class="text-success fw-bold">${{ stock.peak }}</td>
                    <td>
                        {% if stock.buy * 0.95 >= stock.current %}
                            <span class="badge bg-danger">⚠️ Scădere >5%</span>
                        {% else %}
                            <span class="badge bg-success">Monitorizat</span>
                        {% endif %}
                    </td>
                    <td class="text-end pe-4">
                        <button class="btn btn-outline-danger btn-sm border-0" onclick="deleteStock({{ stock.id }})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    const symbolInput = document.getElementById('symbolInput');
    const resultsDiv = document.getElementById('results');
    const finalSymbol = document.getElementById('finalSymbol');

    symbolInput.addEventListener('input', async (e) => {
        const query = e.target.value.trim();
        if (query.length < 2) { resultsDiv.style.display = 'none'; return; }
        
        const response = await fetch(`/search?q=${query}`);
        const data = await response.json();
        
        resultsDiv.innerHTML = '';
        if (data.length > 0) {
            data.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'list-group-item list-group-item-action text-start';
                btn.type = 'button';
                btn.innerHTML = `<strong>${item.symbol}</strong> - ${item.name}`;
                btn.onclick = () => {
                    symbolInput.value = `${item.symbol} (${item.name})`;
                    finalSymbol.value = item.symbol;
                    resultsDiv.style.display = 'none';
                };
                resultsDiv.appendChild(btn);
            });
            resultsDiv.style.display = 'block';
        }
    });

    document.getElementById('stockForm').onsubmit = async (e) => {
        e.preventDefault();
        if (!finalSymbol.value) { alert("Alege o acțiune din listă!"); return; }
        
        const formData = new FormData();
        formData.append('symbol', finalSymbol.value);
        formData.append('price', document.getElementById('purchasePrice').value);
        
        await fetch('/add', { method: 'POST', body: formData });
        location.reload();
    };

    async function deleteStock(id) {
        if (confirm('Ștergi acțiunea?')) {
            await fetch(`/delete/${id}`, { method: 'DELETE' });
            location.reload();
        }
    }
</script>
</body>
</html>
