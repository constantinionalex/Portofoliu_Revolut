<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofoliu Revolut</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .stock-card { transition: transform 0.2s; }
        .stock-card:hover { transform: scale(1.02); }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">📈 Portofoliu Actiuni Revolut</h1>
        <span class="badge bg-primary">Utilizator: Constantin Ion-Alexandru</span>
    </div>
    
    <div class="card border-0 shadow-sm p-4 mb-4">
        <form id="stockForm" class="row g-3">
            <div class="col-md-5">
                <label class="form-label">Simbol Actiune</label>
                <input type="text" id="symbol" class="form-control" placeholder="Ex: TSLA, AAPL, NVDA" required list="stockList">
                <datalist id="stockList">
                    <option value="AAPL">Apple</option>
                    <option value="TSLA">Tesla</option>
                    <option value="NVDA">Nvidia</option>
                    <option value="MSFT">Microsoft</option>
                    <option value="AMZN">Amazon</option>
                </datalist>
            </div>
            <div class="col-md-4">
                <label class="form-label">Pret Achizitie ($)</label>
                <input type="number" id="price" class="form-control" step="0.01" placeholder="0.00" required>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Adauga in Portofoliu</button>
            </div>
        </form>
    </div>

    <div class="table-responsive bg-white rounded shadow-sm">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Simbol</th>
                    <th>Pret Cumparare</th>
                    <th>Maxim 24h</th>
                    <th class="text-end">Actiuni</th>
                </tr>
            </thead>
            <tbody>
                {% for stock in stocks %}
                <tr>
                    <td><strong>{{ stock.symbol }}</strong></td>
                    <td>${{ stock.buy }}</td>
                    <td class="text-info font-monospace">${{ stock.peak }}</td>
                    <td class="text-end">
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteStock({{ stock.id }})">Sterge</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('stockForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('symbol', document.getElementById('symbol').value.toUpperCase());
        formData.append('price', document.getElementById('price').value);
        
        const response = await fetch('/add', {method: 'POST', body: formData});
        if(response.ok) location.reload();
    };

    async function deleteStock(id) {
        if(confirm('Sigur vrei sa elimini actiunea?')) {
            const response = await fetch(`/delete/${id}`, {method: 'DELETE'});
            if(response.ok) location.reload();
        }
    }
</script>
</body>
</html>
