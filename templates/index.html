<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule #1 Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-size: 14px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .badge-buy { background: #28a745; color: white; }
        .badge-sell { background: #dc3545; color: white; }
        .badge-hold { background: #6c757d; color: white; }
        #autocomplete-results { position: absolute; z-index: 1000; width: 100%; top: 40px; }
        .tech-text { font-size: 10px; color: #7f8c8d; }
    </style>
</head>
<body class="p-3">
<div class="container" style="max-width: 850px;">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">📈 Phil Town Strategy</h4>
            <button onclick="manualRefresh()" id="btn-refresh" class="btn btn-sm btn-outline-primary">🔄 Recalculează Tot</button>
        </div>

        <div class="row g-2 mb-4 position-relative">
            <div class="col-7 position-relative">
                <input type="text" id="symbol" class="form-control" placeholder="Simbol (ex: MU)" autocomplete="off">
                <div id="autocomplete-results" class="list-group"></div>
            </div>
            <div class="col-3"><input type="number" id="price" class="form-control" placeholder="Preț Buy"></div>
            <div class="col-2"><button onclick="addStock()" class="btn btn-dark w-100">+</button></div>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr class="text-muted" style="font-size: 11px;">
                        <th>Acțiune</th>
                        <th>Semnal</th>
                        <th>Indicatori (MA | MACD | STOCH)</th>
                        <th>Profit</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in stocks %}
                    <tr>
                        <td><b class="d-block">{{ s.symbol }}</b><small>${{ s.current_price }}</small></td>
                        <td><span class="badge {{ 'badge-buy' if s.last_signal == 'BUY' else 'badge-sell' if s.last_signal == 'SELL' else 'badge-hold' }}">{{ s.last_signal }}</span></td>
                        <td class="tech-text">{{ s.tech_details }}</td>
                        <td class="fw-bold {{ 'text-success' if s.current_price >= s.purchase_price else 'text-danger' }}">
                            {{ (((s.current_price - s.purchase_price)/s.purchase_price)*100)|round(1) }}%
                        </td>
                        <td class="text-end"><button onclick="del({{s.id}})" class="btn btn-sm text-muted">×</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('symbol');
    const results = document.getElementById('autocomplete-results');

    input.addEventListener('input', async () => {
        if (input.value.length < 2) { results.innerHTML = ''; return; }
        try {
            const r = await fetch(`/search?q=${input.value}`);
            const data = await r.json();
            results.innerHTML = data.map(i => `
                <button class="list-group-item list-group-item-action" onclick="sel('${i.symbol}')">
                    <b>${i.symbol}</b> <small>- ${i.name}</small>
                </button>`).join('');
        } catch (e) { console.error(e); }
    });

    function sel(s) { input.value = s; results.innerHTML = ''; }

    async function addStock() {
        const f = new FormData(); 
        f.append('symbol', input.value);
        f.append('price', document.getElementById('price').value);
        await fetch('/add', {method: 'POST', body: f});
        location.reload();
    }

    async function manualRefresh() {
        const btn = document.getElementById('btn-refresh');
        btn.innerText = "⏳ Se calculează...";
        btn.disabled = true;
        await fetch('/refresh_manual');
        location.reload();
    }

    async function del(id) { if(confirm('Ștergi?')) { await fetch('/delete/'+id, {method:'DELETE'}); location.reload(); } }
</script>
</body>
</html>
