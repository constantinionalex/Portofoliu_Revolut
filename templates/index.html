<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portofoliu Revolut</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; font-size: 14px; }
        .container { max-width: 800px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-responsive { border-radius: 10px; }
        .profit-pos { color: #28a745; font-weight: bold; }
        .profit-neg { color: #dc3545; font-weight: bold; }
        #autocomplete-results { 
            position: absolute; z-index: 1000; width: 100%; 
            max-height: 200px; overflow-y: auto; cursor: pointer;
        }
        /* Ajustari specifice pentru mobil */
        @media (max-width: 576px) {
            h2 { font-size: 1.5rem; }
            .btn-sm-custom { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
            td, th { padding: 8px 4px !important; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-3 mb-4">
        <h2 class="text-center mb-3">📈 Monitorizare Revolut</h2>
        
        <div class="row g-2 mb-3 position-relative">
            <div class="col-7">
                <input type="text" id="symbol" class="form-control" placeholder="Caută acțiune (ex: NVDA)" autocomplete="off">
                <div id="autocomplete-results" class="list-group"></div>
            </div>
            <div class="col-3">
                <input type="number" id="price" class="form-control" placeholder="Preț $">
            </div>
            <div class="col-2 d-grid">
                <button onclick="addStock()" class="btn btn-primary btn-sm-custom">+</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Simbol</th>
                        <th>Buy</th>
                        <th>Preț</th>
                        <th>Max Zi</th>
                        <th>+/-</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="stock-table">
                    {% for s in stocks %}
                    <tr>
                        <td><strong>{{ s.symbol }}</strong></td>
                        <td>${{ s.buy }}</td>
                        <td>${{ s.current }}</td>
                        <td class="text-muted">${{ s.high }}</td>
                        <td class="{{ 'profit-pos' if s.profit >= 0 else 'profit-neg' }}">
                            {{ s.profit }}%
                        </td>
                        <td class="text-end">
                            <button onclick="deleteStock({{ s.id }})" class="btn btn-outline-danger btn-sm">×</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <p class="text-center text-muted mt-2" style="font-size: 11px;">Update automat la fiecare 3 minute</p>
    </div>
</div>

<script>
    // Search Autocomplete
    const input = document.getElementById('symbol');
    const results = document.getElementById('autocomplete-results');

    input.addEventListener('input', async () => {
        const q = input.value;
        if (q.length < 2) { results.innerHTML = ''; return; }
        
        const resp = await fetch(`/search?q=${q}`);
        const data = await resp.json();
        
        results.innerHTML = data.map(item => `
            <button class="list-group-item list-group-item-action" onclick="selectSymbol('${item.symbol}')">
                <strong>${item.symbol}</strong> - <small>${item.name}</small>
            </button>
        `).join('');
    });

    function selectSymbol(sym) {
        input.value = sym;
        results.innerHTML = '';
    }

    async function addStock() {
        const sym = input.value;
        const prc = document.getElementById('price').value;
        if(!sym || !prc) return;

        const formData = new FormData();
        formData.append('symbol', sym);
        formData.append('price', prc);

        await fetch('/add', { method: 'POST', body: formData });
        location.reload();
    }

    async function deleteStock(id) {
        if(confirm('Ștergi această acțiune?')) {
            await fetch(`/delete/${id}`, { method: 'DELETE' });
            location.reload();
        }
    }
</script>

</body>
</html>
