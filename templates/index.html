<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Portofoliu Actiuni - Monitorizare 3min</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .results-dropdown { position: absolute; width: 100%; z-index: 1000; background: white; display: none; border: 1px solid #ddd; }
    </style>
</head>
<body>
<div class="container py-5 text-start">
    <h2 class="mb-4 text-primary fw-bold">🚀 Monitorizare Portofoliu (Batch)</h2>

    <div class="card p-4 mb-4">
        <form id="stockForm" class="row g-3 align-items-end">
            <div class="col-md-6 position-relative">
                <label class="form-label fw-bold">Nume sau Simbol</label>
                <input type="text" id="symbolInput" class="form-control" placeholder="Cauta actiune..." autocomplete="off" required>
                <div id="results" class="results-dropdown list-group shadow"></div>
                <input type="hidden" id="finalSymbol">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Pret Achizitie ($)</label>
                <input type="number" id="purchasePrice" class="form-control" step="0.01" required>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100 fw-bold">Adauga Actiune</button>
            </div>
        </form>
    </div>

    <div class="card overflow-hidden">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th class="ps-4">Simbol</th>
                    <th>Achizitie</th>
                    <th>Pret Curent</th>
                    <th>Maxim Zi</th>
                    <th>Evolutie (%)</th>
                    <th class="text-end pe-4">Actiuni</th>
                </tr>
            </thead>
            <tbody>
                {% for stock in stocks %}
                <tr>
                    <td class="ps-4"><strong>{{ stock.symbol }}</strong></td>
                    <td>${{ stock.buy }}</td>
                    <td class="text-primary fw-bold">${{ stock.current }}</td>
                    <td class="text-success">${{ stock.high }}</td>
                    <td class="fw-bold {% if stock.profit >= 0 %}text-success{% else %}text-danger{% endif %}">
                        {{ stock.profit }}%
                    </td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteStock({{ stock.id }})">Sterge</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    const symbolInput = document.getElementById('symbolInput');
    const resultsDiv = document.getElementById('results');
    const finalSymbol = document.getElementById('finalSymbol');

    symbolInput.addEventListener('input', async (e) => {
        const query = e.target.value;
        if (query.length < 2) { resultsDiv.style.display = 'none'; return; }
        const res = await fetch(`/search?q=${query}`);
        const data = await res.json();
        resultsDiv.innerHTML = '';
        data.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'list-group-item list-group-item-action text-start';
            btn.innerHTML = `<strong>${item.symbol}</strong> - ${item.name}`;
            btn.onclick = () => {
                symbolInput.value = item.symbol;
                finalSymbol.value = item.symbol;
                resultsDiv.style.display = 'none';
            };
            resultsDiv.appendChild(btn);
        });
        resultsDiv.style.display = 'block';
    });

    document.getElementById('stockForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('symbol', finalSymbol.value);
        formData.append('price', document.getElementById('purchasePrice').value);
        await fetch('/add', { method: 'POST', body: formData });
        location.reload();
    };

    async function deleteStock(id) {
        if (confirm('Sigur vrei sa stergi monitorizarea?')) {
            await fetch(`/delete/${id}`, { method: 'DELETE' });
            location.reload();
        }
    }
</script>
</body>
</html>
